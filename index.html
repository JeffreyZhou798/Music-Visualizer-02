<head>

<script>
/* Meyda CDN fallback strategy (jsDelivr → cdnjs → unpkg) */
var _meydaFallbackIdx=0;
var _meydaSources=[
  'https://cdnjs.cloudflare.com/ajax/libs/meyda/5.6.3/meyda.min.js',
  'https://unpkg.com/meyda@5.6.3/dist/web/meyda.min.js'
];
function loadMeydaFallback(){
  if(_meydaFallbackIdx>=_meydaSources.length){
    console.warn('[Meyda] All CDN sources failed, AI features disabled');
    return;
  }
  var s=document.createElement('script');
  s.src=_meydaSources[_meydaFallbackIdx++];
  s.onerror=loadMeydaFallback;
  document.head.appendChild(s);
}
</script>
<style>
  :root {
    --bg: #0a0a0f;
    --fg: #e8e6f0;
    --muted: #6b6880;
    --accent: #ff6b35;
    --card: rgba(18, 18, 28, 0.85);
    --border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #visualizer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* Upload Screen */
  #upload-screen {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #upload-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .drop-zone {
    width: 480px; max-width: 90vw;
    padding: 60px 40px;
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.02);
    position: relative;
    overflow: hidden;
  }
  .drop-zone::before {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 24px;
    background: conic-gradient(from 0deg, transparent, var(--accent), transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.4s;
    z-index: -1;
    animation: spin 4s linear infinite;
  }
  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 0.4; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(255,107,53,0.05);
    transform: scale(1.02);
  }
  .drop-icon {
    font-size: 56px;
    color: var(--muted);
    margin-bottom: 20px;
    transition: color 0.3s, transform 0.3s;
  }
  .drop-zone:hover .drop-icon { color: var(--accent); transform: translateY(-4px); }

  /* Mood Panel */
  #mood-panel {
    position: fixed;
    top: 24px; left: 24px;
    z-index: 30;
    opacity: 0;
    transform: translateX(-20px);
    transition: all 0.6s ease;
    pointer-events: none;
  }
  #mood-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .mood-label {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px;
    transition: color 0.5s;
  }
  .mood-confidence {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 200;
  }
  .mood-bars {
    margin-top: 14px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .mood-bar-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--muted);
    font-weight: 400;
  }
  .mood-bar-track {
    width: 100px; height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .mood-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.3s ease, background 0.5s ease;
    width: 0%;
  }

  /* Controls */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 30;
    padding: 16px 24px 20px;
    background: linear-gradient(to top, rgba(10,10,15,0.95), transparent);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease 0.2s;
    pointer-events: none;
  }
  #controls.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

  .progress-wrap {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    margin-bottom: 12px;
    transition: height 0.2s;
  }
  .progress-wrap:hover { height: 8px; }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: var(--accent);
    transition: background 0.5s;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute; right: -6px; top: 50%;
    transform: translateY(-50%) scale(0);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
  }
  .progress-wrap:hover .progress-fill::after { transform: translateY(-50%) scale(1); }

  .ctrl-row {
    display: flex; align-items: center; gap: 16px;
  }
  .ctrl-btn {
    width: 40px; height: 40px;
    border: none; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: var(--fg);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.08); }
  .ctrl-btn.play-btn {
    width: 48px; height: 48px;
    font-size: 18px;
    background: var(--accent);
    color: #fff;
  }
  .ctrl-btn.play-btn:hover { filter: brightness(1.15); }

  .time-display {
    font-size: 12px; color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 90px;
  }
  .song-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 200px;
    color: var(--fg);
  }

  .volume-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto;
  }
  .volume-slider {
    -webkit-appearance: none;
    width: 80px; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,0,0,0.3);
  }

  /* Top-right buttons */
  .top-right-btns {
    position: fixed;
    top: 24px; right: 24px;
    z-index: 40;
    display: flex; gap: 10px;
    opacity: 0;
    transition: all 0.6s ease 0.4s;
    pointer-events: none;
  }
  .top-right-btns.visible { opacity: 1; pointer-events: auto; }
  .top-right-btns button {
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--card);
    color: var(--fg);
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 400;
    cursor: pointer;
    backdrop-filter: blur(12px);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .top-right-btns button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
  .top-right-btns button.active { border-color: #ff4444; color: #ff4444; }

  /* Toast */
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 32px;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    transition: all 0.3s ease;
    backdrop-filter: blur(20px);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* AI Status Panel */
  .ai-status {
    margin-top: 12px;
    display: flex; align-items: center; gap: 10px;
    opacity: 0.7;
  }
  .ai-indicator {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--muted);
    font-weight: 400;
  }
  .ai-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .ai-dot.active {
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.5);
  }
  .ai-dot.loading {
    background: #fbbf24;
    animation: aiPulse 1s infinite;
  }
  @keyframes aiPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .ai-gate-label {
    font-size: 10px; color: var(--muted);
    margin-left: auto;
    font-variant-numeric: tabular-nums;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
  @media (max-width: 640px) {
    .mood-bars { display: none; }
    .volume-wrap { display: none; }
    .song-name { max-width: 120px; }
    .drop-zone { padding: 40px 24px; }
    .drop-icon { font-size: 40px; }
    #mood-panel { top: 16px; left: 16px; }
    .mood-label { font-size: 22px; }
    .top-right-btns { top: 16px; right: 16px; flex-direction: column; gap: 6px; }
    .top-right-btns button { padding: 8px 12px; font-size: 12px; }
  }
</style>
</head>

<script>
/* ======================================================
   i18n System
   ====================================================== */
const I18N = {
  en: {
    title: 'Emotion Spectrum',
    dropHint: 'Drop audio file here',
    dropSub: 'or click to select · MP3 / WAV / OGG / FLAC / MIDI',
    useMic: 'Use Microphone',
    moodEnergetic: 'Energetic',
    moodMelancholy: 'Melancholy',
    moodSerene: 'Serene',
    moodJoyful: 'Joyful',
    moodEthereal: 'Ethereal',
    micBtn: 'Mic',
    analyzing: 'Analyzing',
    detecting: 'Detecting musical emotion...',
    confidence: 'Confidence',
    unknownTrack: 'Unknown Track',
    micInput: 'Microphone Input',
    uploadAudio: 'Please upload an audio file',
    clickPlay: 'Click play to start',
    micDenied: 'Cannot access microphone, please check permissions',
    demoChopin: 'Demo Music',
    moodNames: {
      energetic: 'Energetic', melancholy: 'Melancholy', serene: 'Serene',
      joyful: 'Joyful', ethereal: 'Ethereal', neutral: 'Analyzing'
    }
  },
  zh: {
    title: '情绪光谱',
    dropHint: '拖放音频文件到这里',
    dropSub: '或点击选择文件 · 支持 MP3 / WAV / OGG / FLAC / MIDI',
    useMic: '使用麦克风',
    moodEnergetic: '激昂',
    moodMelancholy: '忧郁',
    moodSerene: '舒缓',
    moodJoyful: '欢快',
    moodEthereal: '空灵',
    micBtn: '麦克风',
    analyzing: '分析中',
    detecting: '正在检测音乐情绪...',
    confidence: '置信度',
    unknownTrack: '未知曲目',
    micInput: '麦克风输入',
    uploadAudio: '请上传音频文件',
    clickPlay: '点击播放按钮开始',
    micDenied: '无法访问麦克风，请检查权限设置',
    demoChopin: '演示音乐',
    moodNames: {
      energetic: '激昂', melancholy: '忧郁', serene: '舒缓',
      joyful: '欢快', ethereal: '空灵', neutral: '分析中'
    }
  }
};

let currentLang = 'en';

/* ======================================================
   MIDI Synthesizer — plays MIDI via Tone.js sampler
   ====================================================== */
class MidiSynth {
  constructor() {
    this.isPlaying = false;
    this.scheduledEvents = [];
    this.startTime = 0;
    this.duration = 0;
    this.toneStarted = false;
    this.sampler = null;
    this.reverb = null;
  }

  async ensureTone() {
    if (!this.toneStarted) {
      await Tone.start();
      this.toneStarted = true;
    }
  }

  async playMidiFile(arrayBuffer, analyzer) {
    await this.ensureTone();
    this.stop();

    const midi = new Midi(arrayBuffer);
    this.duration = midi.duration;

    /* Create a piano sampler using Salamander Grand Piano samples */
    this.sampler = new Tone.Sampler({
      urls: {
        "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
        "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
        "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
        "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
        "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
        "A5": "A5.mp3", "C6": "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3",
        "A6": "A6.mp3", "C7": "C7.mp3",
        "C8": "C8.mp3"
      },
      release: 1.5,
      baseUrl: "https://tonejs.github.io/audio/salamander/"
    });

    /* Reverb for richness */
    this.reverb = new Tone.Reverb({ decay: 2.5, wet: 0.25 });
    this.sampler.connect(this.reverb);
    this.reverb.toDestination();

    /* Wait for samples to load */
    await Tone.loaded();

    /* Connect sampler to a MediaStreamDestination for visualization */
    this.midiStreamDest = null;
    try {
      const toneCtx = Tone.getContext().rawContext;
      this.midiStreamDest = toneCtx.createMediaStreamDestination();
      /* Connect sampler output to both destination (speakers) and stream (visualizer) */
      this.sampler.connect(this.midiStreamDest);
      this.reverb.connect(this.midiStreamDest);
    } catch (e) {
      console.warn('MIDI stream dest creation failed:', e);
    }

    /* Schedule all notes */
    for (const track of midi.tracks) {
      for (const note of track.notes) {
        const id = Tone.Transport.schedule((time) => {
          this.sampler.triggerAttackRelease(
            note.name,
            note.duration,
            time,
            note.velocity
          );
        }, note.time);
        this.scheduledEvents.push(id);
      }
    }

    Tone.Transport.start();
    this.isPlaying = true;

    /* Return the stream for the analyzer */
    return this.midiStreamDest ? this.midiStreamDest.stream : null;
  }

  stop() {
    Tone.Transport.cancel();
    Tone.Transport.stop();
    Tone.Transport.position = 0;
    this.scheduledEvents = [];
    this.isPlaying = false;
    if (this.sampler) {
      try { this.sampler.releaseAll(); } catch(e) {}
      try { this.sampler.dispose(); } catch(e) {}
      this.sampler = null;
    }
    if (this.reverb) {
      try { this.reverb.dispose(); } catch(e) {}
      this.reverb = null;
    }
  }

  getCurrentTime() {
    if (!this.isPlaying) return 0;
    return Tone.Transport.seconds;
  }

  getDuration() {
    return this.duration;
  }

  seekTo(time) {
